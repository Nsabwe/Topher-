<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurMarket</title>

<style>
:root { font-size: 14px; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
  color: #555;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid gray;
}

.left-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-btn {
  font-size: 18px;
  color: white;
  background: green;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.logo { font-size: 1.2rem; color: green; font-weight: bold; }

.top-right { display: flex; gap: 0.5rem; }

.sell-btn, .login-btn {
  padding: 0.4rem 0.7rem;
  font-size: 0.8rem;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

.sell-btn { background: green; color: white; }
.login-btn { background: green; }

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  margin: 0.8rem;
}

.search-box {
  display: flex;
  width: 95%;
  max-width: 500px;
  border: 1px solid gray;
  border-radius: 25px;
  overflow: hidden;
}

.search-box input {
  flex: 1;
  padding: 0.5rem;
  border: none;
  outline: none;
}

.search-btn {
  padding: 0 0.8rem;
  background: green;
  color: white;
  border: none;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 1rem;
  padding: 0.5rem 1rem;
}

.category {
  font-size: 0.8rem;
  color: black;
  cursor: pointer;
}

.category.active {
  border-bottom: 2px solid green;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 10px;
}

.product {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 8px;
  border: 1px solid gray;
  cursor: pointer;
  position: relative;
}

.product img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.product h4 {
  margin: 5px 0;
  color: green;
}

/* EXPANDED */
.product.expanded {
  grid-column: 1 / -1;
  display: flex;
  gap: 10px;
  background: white;
  border: 1px solid gray;
  padding: 10px;
  border-radius: 12px;
}

.product.expanded img {
  width: 45%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 10px;
}

.product-details {
  flex: 1;
}

.product-details p {
  margin: 4px 0;
}

.close-x {
  position: absolute;
  top: 6px;
  right: 8px;
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 500px) {
  .product.expanded {
    flex-direction: column;
  }

  .product.expanded img {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="left-top">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="logo">OurMarket</div>
  </div>

  <div class="top-right">
    <button class="sell-btn" onclick="location.href='sell.html'">Sell</button>
    <button class="login-btn" onclick="location.href='login.html'">Login</button>
  </div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name or location...">
    <button class="search-btn" onclick="loadProducts()">Go</button>
  </div>
</div>

<div class="categories">
  <div class="category active" onclick="filterCategory('all', this)">All</div>
  <div class="category" onclick="filterCategory('phone', this)">Phone</div>
  <div class="category" onclick="filterCategory('clothes', this)">Clothes</div>
  <div class="category" onclick="filterCategory('car', this)">Car</div>
  <div class="category" onclick="filterCategory('land', this)">Land</div>
  <div class="category" onclick="filterCategory('others', this)">Others</div>
</div>

<div class="products" id="productList"></div>

<script>
let currentCategory = "all";
let expandedId = null;
let timeout = null;
let lastProducts = [];

// LOAD PRODUCTS
async function loadProducts() {
  const list = document.getElementById("productList");
  const search = document.getElementById("searchInput").value.trim();

  list.innerHTML = "<p style='padding:10px;'>Loading...</p>";

  try {
    let url = `https://feedserver-6.onrender.com/products?category=${currentCategory}`;

    if (search) {
      url += `&search=${encodeURIComponent(search)}`;
    }

    const res = await fetch(url);
    const data = await res.json();

    lastProducts = data;
    display(data);

  } catch (err) {
    list.innerHTML = "<p style='padding:10px;color:red;'>Failed to load products</p>";
    console.error(err);
  }
}

// DISPLAY
function display(products) {
  const list = document.getElementById("productList");
  list.innerHTML = "";

  if (!products || products.length === 0) {
    list.innerHTML = "<p style='padding:10px;'>No products found</p>";
    return;
  }

  products.forEach(p => {
    const open = expandedId === p._id;

    // FIXED IMAGE BUG (IMPORTANT)
    const image = p.image || "https://via.placeholder.com/150";

    const div = document.createElement("div");
    div.className = "product " + (open ? "expanded" : "");

    div.innerHTML = `
      ${open ? `<button class="close-x">✖</button>` : ""}

      <div class="click-area">
        <img src="${image}" loading="lazy">
        <h4>${p.name || "No name"}</h4>

        <div class="product-details">
          <p><b>Price:</b> ${p.price ?? "N/A"}</p>

          ${open ? `
            <p><b>Phone:</b> ${p.phone || "N/A"}</p>
            <p><b>Location:</b> ${p.location || "N/A"}</p>
            <p style="color:gray;">Tap red X to close</p>
          ` : `
            <p style="color:green;">Tap to view details</p>
          `}
        </div>
      </div>
    `;

    div.querySelector(".click-area").onclick = () => toggleExpand(p._id);

    if (open) {
      div.querySelector(".close-x").onclick = (e) => {
        e.stopPropagation();
        expandedId = null;
        display(lastProducts);
      };
    }

    list.appendChild(div);
  });
}

// TOGGLE
function toggleExpand(id) {
  expandedId = (expandedId === id) ? null : id;
  display(lastProducts);
}

// CATEGORY
function filterCategory(category, el) {
  document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  currentCategory = category;
  expandedId = null;
  loadProducts();
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", () => {
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    expandedId = null;
    loadProducts();
  }, 400);
});

// INIT
loadProducts();
</script>

</body>
</html>
